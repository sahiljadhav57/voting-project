<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainVote - Decentralized Voting System</title>

    <!-- Tailwind CSS (Stable) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Utilities */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- UTILS: Simulating Blockchain Cryptography ---
        const simpleHash = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return Math.abs(hash).toString(16) + "x" + Math.random().toString(36).substring(2, 10);
        };

        // --- DATA MODELS ---
        const INITIAL_ELECTIONS = [
            {
                id: 1,
                title: "Presidential Election 2025",
                description: "Vote for the next President.",
                candidates: [
                    { id: 101, name: "Narendra Modi", party: "BJP", votes: 0, avatar: "🟠" },
                    { id: 102, name: "Rahul Gandhi", party: "Congress", votes: 0, avatar: "🔷" },
                    { id: 103, name: "Arvind Kejriwal", party: "AAM Aadmi Party", votes: 0, avatar: "🔵" }
                ],
                startDate: new Date(Date.now() - 86400000).toISOString().slice(0, 16), // Yesterday
                endDate: new Date(Date.now() + 86400000 * 2).toISOString().slice(0, 16), // 2 days later
                status: "Active", // Active, Pending, Ended
            }
        ];

        const INITIAL_USERS = [
            { id: 1, username: "admin", password: "123", role: "admin", hasVoted: {} },
            { id: 2, username: "user1", password: "123", role: "user", hasVoted: {} },
            { id: 3, username: "user2", password: "123", role: "user", hasVoted: {} }
        ];

        // --- COMPONENTS ---

        // 1. LOGIN / REGISTER
        const Login = ({ onLogin, onRegister }) => {
            const [isAdminLogin, setIsAdminLogin] = useState(false);

            // User State (Aadhaar)
            const [aadhaar, setAadhaar] = useState("");
            const [otp, setOtp] = useState("");
            const [otpSent, setOtpSent] = useState(false);
            const [regionStep, setRegionStep] = useState(false); // New Step

            // Region State
            const [selectedState, setSelectedState] = useState("");
            const [selectedDistrict, setSelectedDistrict] = useState("");
            const [selectedConstituency, setSelectedConstituency] = useState("");

            // Admin State
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");

            const [error, setError] = useState("");

            // Mock Data for Regions
            const REGION_DATA = {
                "Maharashtra": {
                    "Mumbai": ["Mumbai South", "Mumbai North"],
                    "Pune": ["Pune City", "Baramati"]
                },
                "Delhi": {
                    "New Delhi": ["New Delhi", "Chandni Chowk"],
                    "South Delhi": ["South Delhi", "Mehrauli"]
                },
                "Karnataka": {
                    "Bangalore": ["Bangalore South", "Bangalore North"],
                    "Mysore": ["Mysore", "Chamundeshwari"]
                }
            };

            const handleUserLogin = (e) => {
                e.preventDefault();
                if (!otpSent) {
                    if (aadhaar.length !== 12) {
                        setError("Please enter a valid 12-digit Aadhaar number.");
                        return;
                    }
                    // Simulate OTP Send
                    setOtpSent(true);
                    setError("");
                    alert("OTP Sent: 123456"); // Simulation
                } else if (!regionStep) {
                    if (otp === "123456") {
                        // OTP Verified, Move to Region Step
                        setRegionStep(true);
                        setError("");
                    } else {
                        setError("Invalid OTP. Try 123456");
                    }
                } else {
                    // Final Login with Region Data
                    if (!selectedState || !selectedDistrict || !selectedConstituency) {
                        setError("Please select all region details.");
                        return;
                    }
                    onLogin(aadhaar, "user_auth", {
                        state: selectedState,
                        district: selectedDistrict,
                        constituency: selectedConstituency
                    });
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const success = onLogin(username, password);
                if (!success) setError("Invalid Admin credentials.");
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 text-white">
                    <div className="w-full max-w-md p-8 bg-slate-800/50 backdrop-blur-xl rounded-2xl border border-slate-700 shadow-2xl fade-in relative">

                        {/* Admin Toggle */}
                        <button
                            onClick={() => {
                                setIsAdminLogin(!isAdminLogin);
                                setError("");
                                setOtpSent(false);
                                setRegionStep(false);
                                setAadhaar("");
                                setOtp("");
                                setUsername("");
                                setPassword("");
                            }}
                            className="absolute top-4 right-4 text-xs text-slate-400 hover:text-white transition-colors"
                        >
                            {isAdminLogin ? "User Login" : "Login as Admin"}
                        </button>

                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                                <i className="fas fa-vote-yea text-2xl text-white"></i>
                            </div>
                            <h2 className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                                ChainVote
                            </h2>
                            <p className="text-slate-400 mt-2">Secure Blockchain Voting System</p>
                        </div>

                        {isAdminLogin ? (
                            /* ADMIN LOGIN FORM */
                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <h3 className="text-center text-lg font-semibold text-blue-400">Admin Access</h3>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Username</label>
                                    <input
                                        type="text"
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        placeholder="admin"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Password</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        placeholder="password"
                                    />
                                </div>
                                {error && <p className="text-red-400 text-sm text-center bg-red-400/10 p-2 rounded border border-red-400/20">{error}</p>}
                                <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg shadow-blue-600/20 transition-all transform hover:scale-[1.02]">
                                    Login as Admin
                                </button>
                            </form>
                        ) : (
                            /* USER LOGIN FORM (AADHAAR -> OTP -> REGION) */
                            <form onSubmit={handleUserLogin} className="space-y-4">
                                <h3 className="text-center text-lg font-semibold text-emerald-400">Voter Authentication</h3>

                                {!regionStep ? (
                                    <>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-300 mb-1">Aadhaar Number</label>
                                            <input
                                                type="text"
                                                value={aadhaar}
                                                onChange={(e) => {
                                                    const val = e.target.value.replace(/\D/g, '').slice(0, 12);
                                                    setAadhaar(val);
                                                }}
                                                disabled={otpSent}
                                                className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all tracking-widest"
                                                placeholder="1234 5678 9012"
                                            />
                                        </div>

                                        {otpSent && (
                                            <div className="fade-in">
                                                <label className="block text-sm font-medium text-slate-300 mb-1">Enter OTP</label>
                                                <input
                                                    type="text"
                                                    value={otp}
                                                    onChange={(e) => setOtp(e.target.value.slice(0, 6))}
                                                    className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all tracking-widest text-center text-xl"
                                                    placeholder="• • • • • •"
                                                />
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    /* REGION SELECTION STEP */
                                    <div className="space-y-3 fade-in">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-300 mb-1">State</label>
                                            <select
                                                value={selectedState}
                                                onChange={(e) => {
                                                    setSelectedState(e.target.value);
                                                    setSelectedDistrict("");
                                                    setSelectedConstituency("");
                                                }}
                                                className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-slate-300"
                                            >
                                                <option value="">Select State</option>
                                                {Object.keys(REGION_DATA).map(state => (
                                                    <option key={state} value={state}>{state}</option>
                                                ))}
                                            </select>
                                        </div>

                                        {selectedState && (
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-1">District</label>
                                                <select
                                                    value={selectedDistrict}
                                                    onChange={(e) => {
                                                        setSelectedDistrict(e.target.value);
                                                        setSelectedConstituency("");
                                                    }}
                                                    className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-slate-300"
                                                >
                                                    <option value="">Select District</option>
                                                    {Object.keys(REGION_DATA[selectedState]).map(dist => (
                                                        <option key={dist} value={dist}>{dist}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        )}

                                        {selectedDistrict && (
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-1">Constituency</label>
                                                <select
                                                    value={selectedConstituency}
                                                    onChange={(e) => setSelectedConstituency(e.target.value)}
                                                    className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-slate-300"
                                                >
                                                    <option value="">Select Constituency</option>
                                                    {REGION_DATA[selectedState][selectedDistrict].map(constituency => (
                                                        <option key={constituency} value={constituency}>{constituency}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {error && <p className="text-red-400 text-sm text-center bg-red-400/10 p-2 rounded border border-red-400/20">{error}</p>}

                                <button type="submit" className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg shadow-lg shadow-emerald-600/20 transition-all transform hover:scale-[1.02]">
                                    {!otpSent ? "Request OTP" : (!regionStep ? "Verify & Proceed" : "Complete Registration")}
                                </button>
                            </form>
                        )}

                        <div className="mt-6 pt-4 border-t border-slate-700/50 text-xs text-center text-slate-500">
                            <p>Default Admin: admin / 123</p>
                            <p>Mock OTP: 123456</p>
                        </div>
                    </div>
                </div>
            );
        };

        // 2. NAVBAR
        const Navbar = ({ user, onLogout, walletConnected, setWalletConnected, walletAddress }) => {
            return (
                <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16">
                            <div className="flex items-center">
                                <i className="fas fa-link text-blue-600 text-xl mr-2"></i>
                                <span className="text-xl font-bold text-slate-800">ChainVote</span>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="hidden md:flex items-center space-x-2 px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
                                    <div className={`w-2 h-2 rounded-full ${walletConnected ? 'bg-green-500' : 'bg-red-500'} animate-pulse`}></div>
                                    <span className="text-xs font-mono text-slate-600">
                                        {walletConnected ? `${walletAddress.substring(0, 6)}...${walletAddress.substring(38)}` : "Not Connected"}
                                    </span>
                                </div>

                                {!walletConnected && (
                                    <button
                                        onClick={() => setWalletConnected(true)}
                                        className="text-sm bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center"
                                    >
                                        <i className="fas fa-wallet mr-2"></i> Connect Wallet
                                    </button>
                                )}

                                <div className="flex items-center space-x-3 pl-4 border-l border-slate-200">
                                    <div className="text-right hidden sm:block">
                                        <div className="text-sm font-semibold text-slate-800">{user.username}</div>
                                        <div className="text-xs text-slate-500 uppercase">{user.role}</div>
                                    </div>
                                    <div className="h-8 w-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold shadow-md">
                                        {user.username[0].toUpperCase()}
                                    </div>
                                    <button onClick={onLogout} className="text-slate-400 hover:text-red-500 transition-colors">
                                        <i className="fas fa-sign-out-alt text-lg"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // 3. BLOCKCHAIN VISUALIZER
        const BlockchainViewer = ({ chain }) => {
            const [show, setShow] = useState(false);

            return (
                <div className="bg-slate-900 text-slate-300 p-6 rounded-xl shadow-xl border border-slate-700 mb-8 overflow-hidden">
                    <div className="flex justify-between items-center mb-4 cursor-pointer" onClick={() => setShow(!show)}>
                        <h3 className="text-lg font-bold text-white flex items-center">
                            <i className="fas fa-cubes mr-2 text-emerald-400"></i> Live Blockchain Ledger
                        </h3>
                        <i className={`fas fa-chevron-${show ? 'up' : 'down'} transition-transform`}></i>
                    </div>

                    {show && (
                        <div className="flex space-x-4 overflow-x-auto pb-4 custom-scrollbar">
                            {chain.map((block, idx) => (
                                <div key={idx} className="min-w-[280px] bg-slate-800 p-4 rounded-lg border border-slate-600 flex-shrink-0 hover:border-blue-500 transition-colors relative group">
                                    <div className="absolute -top-3 -right-3 bg-blue-600 text-white text-xs px-2 py-1 rounded shadow-md">
                                        Block #{block.index}
                                    </div>
                                    <div className="space-y-2 text-xs font-mono">
                                        <div>
                                            <span className="text-slate-500">Hash:</span>
                                            <div className="text-emerald-400 truncate">{block.hash}</div>
                                        </div>
                                        <div>
                                            <span className="text-slate-500">Prev Hash:</span>
                                            <div className="text-slate-400 truncate">{block.prevHash}</div>
                                        </div>
                                        <div className="pt-2 border-t border-slate-700 mt-2">
                                            <span className="text-slate-500 block mb-1">Data:</span>
                                            <div className="bg-slate-900 p-2 rounded text-blue-300">
                                                {block.data.type}
                                                {block.data.voter && <div className="text-slate-500 mt-1">Voter: {block.data.voterHash}</div>}
                                            </div>
                                        </div>
                                        <div className="text-right text-slate-600 mt-2">
                                            {new Date(block.timestamp).toLocaleTimeString()}
                                        </div>
                                    </div>
                                    {idx < chain.length - 1 && (
                                        <div className="absolute top-1/2 -right-6 w-4 h-0.5 bg-slate-600"></div>
                                    )}
                                </div>
                            ))}
                            {chain.length === 0 && <p className="text-slate-500">Genesis block waiting...</p>}
                        </div>
                    )}
                </div>
            );
        };

        // 4. DASHBOARD
        const Dashboard = ({ user, elections, chain, onVote, onCreateElection, onUpdateStatus }) => {
            const [activeTab, setActiveTab] = useState('elections');

            // Admin State for new election
            const [newElection, setNewElection] = useState({
                title: '',
                description: '',
                startDate: '',
                endDate: '',
                candidates: [{ name: '', party: '', avatar: '👤' }]
            });

            const handleAddCandidate = () => {
                setNewElection({
                    ...newElection,
                    candidates: [...newElection.candidates, { name: '', party: '', avatar: '👤' }]
                });
            };

            const handleCandidateChange = (index, field, value) => {
                const updated = [...newElection.candidates];
                updated[index][field] = value;
                setNewElection({ ...newElection, candidates: updated });
            };

            const handleCreateElection = (e) => {
                e.preventDefault();
                onCreateElection(newElection);
                setActiveTab('elections');
                setNewElection({
                    title: '',
                    description: '',
                    startDate: '',
                    endDate: '',
                    candidates: [{ name: '', party: '', avatar: '👤' }]
                });
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <BlockchainViewer chain={chain} />

                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">
                            {activeTab === 'elections' ? 'Election Center' : 'Create Election'}
                        </h2>

                        {user.role === 'admin' && (
                            <div className="flex space-x-2 bg-white p-1 rounded-lg border border-slate-200 shadow-sm">
                                <button
                                    onClick={() => setActiveTab('elections')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'elections' ? 'bg-blue-50 text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    Manage Elections
                                </button>
                                <button
                                    onClick={() => setActiveTab('create')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'create' ? 'bg-blue-50 text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    Create New
                                </button>
                                <button
                                    onClick={() => setActiveTab('contract')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'contract' ? 'bg-blue-50 text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    <i className="fas fa-file-code mr-1"></i> Contract
                                </button>
                            </div>
                        )}
                    </div>

                    {activeTab === 'contract' && user.role === 'admin' ? (
                        <div className="bg-[#1e1e1e] rounded-xl shadow-lg border border-slate-700 p-0 overflow-hidden fade-in font-mono text-sm">
                            <div className="bg-[#2d2d2d] px-4 py-2 border-b border-slate-700 flex justify-between items-center">
                                <span className="text-slate-300"><i className="fab fa-ethereum text-purple-400 mr-2"></i>Voting.sol</span>
                                <span className="text-xs text-slate-500">Solidity 0.8.0</span>
                            </div>
                            <div className="p-4 overflow-auto text-slate-300 h-[500px]">
                                <pre>{`// SPDX-License-Identifier: MIT
pragma solidity ^0.8.0;

contract VotingSystem {
    struct Candidate {
        uint id;
        string name;
        uint voteCount;
    }

    struct Election {
        uint id;
        string title;
        uint startDate;
        uint endDate;
        bool active;
        mapping(uint => Candidate) candidates;
        uint candidatesCount;
        mapping(address => bool) voters;
    }

    mapping(uint => Election) public elections;
    uint public electionsCount;
    address public admin;

    event ElectionCreated(uint id, string title);
    event Voted(uint electionId, uint candidateId, address voter);

    constructor() {
        admin = msg.sender;
    }

    modifier onlyAdmin() {
        require(msg.sender == admin, "Only admin can perform this action");
        _;
    }

    function createElection(string memory _title, uint _start, uint _end) public onlyAdmin {
        electionsCount++;
        Election storage e = elections[electionsCount];
        e.id = electionsCount;
        e.title = _title;
        e.startDate = _start;
        e.endDate = _end;
        e.active = true;
        emit ElectionCreated(electionsCount, _title);
    }

    function addCandidate(uint _electionId, string memory _name) public onlyAdmin {
        Election storage e = elections[_electionId];
        e.candidatesCount++;
        e.candidates[e.candidatesCount] = Candidate(e.candidatesCount, _name, 0);
    }

    function vote(uint _electionId, uint _candidateId) public {
        Election storage e = elections[_electionId];
        require(block.timestamp >= e.startDate && block.timestamp <= e.endDate, "Election not active");
        require(!e.voters[msg.sender], "You have already voted.");
        require(_candidateId > 0 && _candidateId <= e.candidatesCount, "Invalid candidate");

        e.voters[msg.sender] = true;
        e.candidates[_candidateId].voteCount++;

        emit Voted(_electionId, _candidateId, msg.sender);
    }
}`}</pre>
                            </div>
                        </div>
                    ) : activeTab === 'create' && user.role === 'admin' ? (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 fade-in">
                            <form onSubmit={handleCreateElection} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        <h3 className="text-lg font-semibold text-slate-800 border-b pb-2">Election Details</h3>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Title</label>
                                            <input required type="text" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                                value={newElection.title} onChange={e => setNewElection({ ...newElection, title: e.target.value })} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Description</label>
                                            <textarea required className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none h-24"
                                                value={newElection.description} onChange={e => setNewElection({ ...newElection, description: e.target.value })} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
                                                <input required type="datetime-local" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                                    value={newElection.startDate} onChange={e => setNewElection({ ...newElection, startDate: e.target.value })} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">End Date</label>
                                                <input required type="datetime-local" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                                    value={newElection.endDate} onChange={e => setNewElection({ ...newElection, endDate: e.target.value })} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center border-b pb-2">
                                            <h3 className="text-lg font-semibold text-slate-800">Candidates</h3>
                                            <button type="button" onClick={handleAddCandidate} className="text-sm text-blue-600 hover:text-blue-700 font-medium">
                                                + Add Candidate
                                            </button>
                                        </div>
                                        <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                            {newElection.candidates.map((cand, idx) => (
                                                <div key={idx} className="p-4 bg-slate-50 rounded-lg border border-slate-200 relative group">
                                                    <div className="absolute top-2 right-2 text-xs text-slate-400 font-mono">#{idx + 1}</div>
                                                    <div className="grid grid-cols-1 gap-3">
                                                        <input required placeholder="Candidate Name" className="w-full px-3 py-2 bg-white border rounded focus:border-blue-500 outline-none text-sm"
                                                            value={cand.name} onChange={e => handleCandidateChange(idx, 'name', e.target.value)} />
                                                        <input required placeholder="Party / Affiliation" className="w-full px-3 py-2 bg-white border rounded focus:border-blue-500 outline-none text-sm"
                                                            value={cand.party} onChange={e => handleCandidateChange(idx, 'party', e.target.value)} />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-4 border-t flex justify-end">
                                    <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow-lg shadow-blue-600/20 transition-all">
                                        Deploy Election Contract
                                    </button>
                                </div>
                            </form>
                        </div>
                    ) : (
                        <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3">
                            {elections.map(election => (
                                <ElectionCard
                                    key={election.id}
                                    election={election}
                                    user={user}
                                    onVote={onVote}
                                    onUpdateStatus={onUpdateStatus}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ElectionCard = ({ election, user, onVote, onUpdateStatus }) => {
            const [votingFor, setVotingFor] = useState(null);
            const [processing, setProcessing] = useState(false);

            const hasVoted = user.hasVoted && user.hasVoted[election.id];
            const isEnded = new Date(election.endDate) < new Date() || election.status === "Ended";
            const isStarted = new Date(election.startDate) <= new Date() || election.status === "Active";

            // Calculate total votes
            const totalVotes = election.candidates.reduce((acc, curr) => acc + curr.votes, 0);

            // Determine Winner
            const getWinner = () => {
                if (election.candidates.length === 0) return null;
                return election.candidates.reduce((prev, current) => (prev.votes > current.votes) ? prev : current);
            };
            const winner = getWinner();

            const handleVote = async (candidateId) => {
                setVotingFor(candidateId);
                setProcessing(true);

                // Simulate network delay and mining
                setTimeout(() => {
                    onVote(election.id, candidateId);
                    setProcessing(false);
                    setVotingFor(null);
                }, 2000);
            };

            const getStatusColor = () => {
                if (election.status === "Ended") return "bg-red-100 text-red-700";
                if (election.status === "Active") return "bg-green-100 text-green-700";
                return "bg-yellow-100 text-yellow-700";
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col h-full fade-in">
                    <div className="p-5 border-b border-slate-100">
                        <div className="flex justify-between items-start mb-2">
                            <span className={`px-2 py-1 rounded text-xs font-bold uppercase tracking-wider ${getStatusColor()}`}>
                                {election.status}
                            </span>
                            {user.role === 'admin' && (
                                <div className="flex space-x-1">
                                    {election.status !== 'Active' && election.status !== 'Ended' && (
                                        <button onClick={() => onUpdateStatus(election.id, 'Active')} className="p-1 text-green-600 hover:bg-green-50 rounded" title="Start Election">
                                            <i className="fas fa-play"></i>
                                        </button>
                                    )}
                                    {election.status === 'Active' && (
                                        <button onClick={() => onUpdateStatus(election.id, 'Ended')} className="p-1 text-red-600 hover:bg-red-50 rounded" title="End Election">
                                            <i className="fas fa-stop"></i>
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                        <h3 className="text-xl font-bold text-slate-800 mb-1">{election.title}</h3>
                        <p className="text-slate-500 text-sm line-clamp-2">{election.description}</p>
                        <div className="mt-3 flex items-center text-xs text-slate-400 space-x-4">
                            <span><i className="far fa-calendar-alt mr-1"></i> Start: {new Date(election.startDate).toLocaleDateString()}</span>
                            <span><i className="far fa-flag mr-1"></i> End: {new Date(election.endDate).toLocaleDateString()}</span>
                        </div>

                        {/* WINNER DECLARATION - ONLY SHOWN WHEN ENDED */}
                        {isEnded && winner && winner.votes > 0 && (
                            <div className="mt-4 p-4 bg-gradient-to-r from-yellow-100 to-amber-100 border border-yellow-200 rounded-lg flex items-center justify-between animate-pulse shadow-sm">
                                <div>
                                    <h4 className="text-[10px] font-bold text-yellow-800 uppercase tracking-wider flex items-center">
                                        <i className="fas fa-trophy mr-1 text-yellow-600"></i> Election Winner
                                    </h4>
                                    <div className="flex items-center mt-1">
                                        <span className="text-2xl mr-2">{winner.avatar}</span>
                                        <span className="font-bold text-slate-800 text-lg">{winner.name}</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className="text-2xl font-bold text-yellow-700">{winner.votes}</div>
                                    <div className="text-[10px] text-yellow-600 uppercase">votes</div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-5 flex-grow flex flex-col space-y-4">
                        {election.candidates.map(cand => {
                            const percent = totalVotes === 0 ? 0 : Math.round((cand.votes / totalVotes) * 100);
                            return (
                                <div key={cand.id} className="relative">
                                    <div className="flex items-center justify-between mb-1 z-10 relative">
                                        <div className="flex items-center">
                                            <span className="text-2xl mr-3">{cand.avatar}</span>
                                            <div>
                                                <div className="font-semibold text-slate-700">{cand.name}</div>
                                                <div className="text-xs text-slate-500">{cand.party}</div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            {/* SHOW VOTES ONLY IF ENDED (FOR EVERYONE) */}
                                            {isEnded ? (
                                                <div className="font-bold text-slate-800">{cand.votes} <span className="text-xs font-normal text-slate-500">votes</span></div>
                                            ) : (
                                                /* HIDE VOTE BUTTON FOR ADMINS */
                                                user.role === 'admin' ? (
                                                    <span className="text-xs text-slate-400 italic">Admin View</span>
                                                ) : (
                                                    processing && votingFor === cand.id ? (
                                                        <i className="fas fa-circle-notch animate-spin text-blue-600"></i>
                                                    ) : (
                                                        <button
                                                            onClick={() => handleVote(cand.id)}
                                                            disabled={!isStarted || processing || hasVoted}
                                                            className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                                        >
                                                            {hasVoted ? "Voted" : "Vote"}
                                                        </button>
                                                    )
                                                )
                                            )}
                                        </div>
                                    </div>
                                    {/* SHOW PROGRESS BAR ONLY IF ENDED (FOR EVERYONE) */}
                                    {isEnded && (
                                        <div className="w-full bg-slate-100 rounded-full h-1.5 mt-2 overflow-hidden">
                                            <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-1000" style={{ width: `${percent}%` }}></div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {hasVoted && (
                        <div className="bg-green-50 p-3 text-center border-t border-green-100">
                            <p className="text-green-700 text-xs font-semibold flex items-center justify-center">
                                <i className="fas fa-check-circle mr-2"></i> Vote Cast On-Chain
                            </p>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP CONTAINER ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [elections, setElections] = useState(INITIAL_ELECTIONS);
            const [chain, setChain] = useState([]);
            const [users, setUsers] = useState(INITIAL_USERS);
            const [walletConnected, setWalletConnected] = useState(false);
            const [walletAddress, setWalletAddress] = useState("");

            // Initialize Genesis Block
            useEffect(() => {
                const genesisBlock = {
                    index: 0,
                    timestamp: Date.now(),
                    data: { type: "GENESIS", info: "System Init" },
                    prevHash: "0",
                    hash: simpleHash("GENESIS_BLOCK")
                };
                setChain([genesisBlock]);

                // Generate random wallet
                const addr = "0x" + Array(40).fill(0).map(x => Math.random().toString(16)[2]).join('');
                setWalletAddress(addr);
            }, []);

            const login = (username, password, regionData = null) => {
                // Check for Admin
                if (username === "admin" && password === "123") {
                    const adminUser = users.find(u => u.role === "admin");
                    setUser(adminUser);
                    return true;
                }

                // Check for User (Aadhaar Auth)
                // In this mock, we treat the 'username' arg as the Aadhaar number if it's not 'admin'
                if (password === "user_auth") {
                    // Check if user exists, else create
                    let existingUser = users.find(u => u.username === username);
                    if (!existingUser) {
                        existingUser = {
                            id: users.length + 1,
                            username: username, // Aadhaar as username
                            password: "auth",
                            role: "user",
                            hasVoted: {},
                            region: regionData // Store Region Data
                        };
                        setUsers([...users, existingUser]);
                    } else if (regionData) {
                        // Update existing user with new region data if provided
                        existingUser = { ...existingUser, region: regionData };
                        setUsers(users.map(u => u.id === existingUser.id ? existingUser : u));
                    }
                    setUser(existingUser);
                    return true;
                }

                return false;
            };

            const register = (username, password) => {
                const newUser = {
                    id: users.length + 1,
                    username,
                    password,
                    role: "user",
                    hasVoted: {}
                };
                setUsers([...users, newUser]);
                setUser(newUser);
            };

            const logout = () => {
                setUser(null);
                setWalletConnected(false);
            };

            const createElection = (data) => {
                const newId = elections.length + 1;
                const newElection = {
                    id: newId,
                    ...data,
                    candidates: data.candidates.map((c, i) => ({ ...c, id: newId * 100 + i, votes: 0 })),
                    status: "Pending"
                };
                setElections([newElection, ...elections]);

                // Add to blockchain
                const newBlock = {
                    index: chain.length,
                    timestamp: Date.now(),
                    data: { type: "CONTRACT_DEPLOY", electionId: newId, title: data.title },
                    prevHash: chain[chain.length - 1].hash,
                    hash: simpleHash(`DEPLOY_${newId}_${Date.now()}`)
                };
                setChain([...chain, newBlock]);
            };

            const updateElectionStatus = (id, status) => {
                const updatedElections = elections.map(e => {
                    if (e.id === id) return { ...e, status };
                    return e;
                });
                setElections(updatedElections);

                const newBlock = {
                    index: chain.length,
                    timestamp: Date.now(),
                    data: { type: "STATUS_CHANGE", electionId: id, status },
                    prevHash: chain[chain.length - 1].hash,
                    hash: simpleHash(`STATUS_${id}_${status}_${Date.now()}`)
                };
                setChain([...chain, newBlock]);
            };

            const vote = (electionId, candidateId) => {
                if (!walletConnected) {
                    alert("Please connect your wallet first!");
                    return;
                }

                // Update Election Count
                const updatedElections = elections.map(e => {
                    if (e.id === electionId) {
                        const updatedCandidates = e.candidates.map(c => {
                            if (c.id === candidateId) return { ...c, votes: c.votes + 1 };
                            return c;
                        });
                        return { ...e, candidates: updatedCandidates };
                    }
                    return e;
                });
                setElections(updatedElections);

                // Update User Status
                const updatedUser = { ...user, hasVoted: { ...user.hasVoted, [electionId]: true } };
                setUser(updatedUser);

                // Update global user list to persist vote status across logins in this session
                const updatedUsers = users.map(u => u.id === user.id ? updatedUser : u);
                setUsers(updatedUsers);

                // Add to Blockchain
                const txData = {
                    type: "VOTE",
                    electionId,
                    candidateId,
                    voter: user.username,
                    voterHash: simpleHash(user.username + walletAddress)
                };

                const newBlock = {
                    index: chain.length,
                    timestamp: Date.now(),
                    data: txData,
                    prevHash: chain[chain.length - 1].hash,
                    hash: simpleHash(JSON.stringify(txData) + Date.now())
                };
                setChain([...chain, newBlock]);
            };

            if (!user) {
                return <Login onLogin={login} onRegister={register} />;
            }

            return (
                <div className="min-h-screen pb-12">
                    <Navbar
                        user={user}
                        onLogout={logout}
                        walletConnected={walletConnected}
                        setWalletConnected={setWalletConnected}
                        walletAddress={walletAddress}
                    />
                    <Dashboard
                        user={user}
                        elections={elections}
                        chain={chain}
                        onVote={vote}
                        onCreateElection={createElection}
                        onUpdateStatus={updateElectionStatus}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
